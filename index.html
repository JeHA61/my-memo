<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACK SPACE</title>
    <style>
        /* 레이아웃 보존: 검은색 배경과 깔끔한 디자인 */
        body {
            margin: 0;
            padding: 20px;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 입력 영역 */
        #diary-input {
            width: 100%;
            height: 60vh;
            background-color: #000;
            color: #fff;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
            box-sizing: border-box;
            resize: none;
        }

        /* 이미지 미리보기 영역 */
        #image-preview {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .preview-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid #444;
        }

        /* 하단 버튼 바 */
        .toolbar {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .btn-attach { background-color: #222; color: #fff; }
        .btn-save { background-color: #fff; color: #000; }

        /* 파일 입력창 숨기기 */
        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">BLACK SPACE</div>
        <div id="status" style="font-size: 0.8rem; color: #666;">자동 저장됨</div>
    </div>

    <!-- 일기 본문 -->
    <textarea id="diary-input" placeholder="오늘의 기록을 남겨보세요..."></textarea>

    <!-- 사진 미리보기 -->
    <div id="image-preview"></div>

    <!-- 하단 도구 -->
    <div class="toolbar">
        <label for="file-input" class="btn btn-attach">사진 첨부</label>
        <input type="file" id="file-input" accept="image/*" multiple>
        <button class="btn btn-save" onclick="saveDiary()">저장하기</button>
    </div>

    <script>
        const diaryInput = document.getElementById('diary-input');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('image-preview');
        const statusText = document.getElementById('status');

        // 1. [기능] 페이지 로드 시 기존 내용 불러오기
        window.onload = () => {
            const savedContent = localStorage.getItem('diary_content');
            if (savedContent) {
                diaryInput.value = savedContent;
            }
        };

        // 2. [기능] 저장 기능 (브라우저 로컬 저장소 사용)
        function saveDiary() {
            localStorage.setItem('diary_content', diaryInput.value);
            statusText.innerText = "저장 완료";
            statusText.style.color = "#fff";
            
            setTimeout(() => {
                statusText.innerText = "자동 저장됨";
                statusText.style.color = "#666";
            }, 2000);
            
            alert('일기가 안전하게 저장되었습니다.');
        }

        // 3. [기능] 사진 첨부 및 미리보기
        fileInput.addEventListener('change', function(e) {
            const files = e.target.files;
            for(let i=0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    img.className = 'preview-img';
                    previewContainer.appendChild(img);
                }
                reader.readAsDataURL(files[i]);
            }
        });

        // 4. [기능] 입력 시 실시간 임시 저장 (웹의 안전성)
        diaryInput.addEventListener('input', () => {
            localStorage.setItem('diary_content', diaryInput.value);
        });
    </script>
</body>
</html>
