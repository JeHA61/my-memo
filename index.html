<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 보안성 강화: CSP 설정 (스크립트 및 스타일 허용 범위 제한) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' ;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json"> <!-- 앱 화를 위한 매니페스트 -->
    <title>BLACK SPACE</title>
    <style>
        /* [기존 디자인 유지] */
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; height: 100%; overflow: hidden; }
        
        /* 헤더: 기존 127.0.0.1 스타일 유지 */
        .header { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #111; }
        .folder-btn { color: #666; font-size: 14px; cursor: pointer; border: none; background: none; }
        .save-btn { color: #fff; font-weight: bold; cursor: pointer; border: none; background: none; }

        /* 에디터 영역 */
        .editor { display: flex; flex-direction: column; height: 100%; padding: 20px; }
        
        /* 제목 입력창 */
        #title { 
            background: none; border: none; color: #fff; font-size: 24px; 
            outline: none; width: 100%; padding-bottom: 10px;
        }

        /* [요구사항] 제목과 본문을 나누는 선 */
        .divider { height: 1px; background: #222; margin-bottom: 20px; }

        /* 본문 입력창 */
        #content { 
            background: none; border: none; color: #ccc; font-size: 16px; 
            outline: none; width: 100%; flex: 1; resize: none; line-height: 1.6;
        }

        /* [요구사항] 세련된 뉴 폴더 입력창 (과하지 않은 블랙 디자인) */
        #folder-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-box { background: #111; padding: 30px; border-radius: 8px; width: 80%; max-width: 300px; text-align: center; }
        .modal-box input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; margin-bottom: 15px; }
        .modal-box button { background: none; border: none; color: #007AFF; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <button class="folder-btn" onclick="showFolderModal()">+ NEW FOLDER</button>
        <button class="save-btn" onclick="saveData()">SAVE</button>
    </div>

    <div class="editor">
        <input type="text" id="title" placeholder="Title" spellcheck="false">
        <div class="divider"></div> <!-- 구분선 -->
        <textarea id="content" placeholder="Start typing..." spellcheck="false"></textarea>
    </div>

    <!-- 폴더 생성 모달 -->
    <div id="folder-modal">
        <div class="modal-box">
            <input type="text" id="folder-input" placeholder="Folder Name">
            <button onclick="createFolder()">CREATE</button>
            <button onclick="hideFolderModal()" style="color:#666; margin-left: 10px;">CANCEL</button>
        </div>
    </div>

    <script>
        // 데이터 동기화 및 저장 (iCloud 대응을 위한 로컬 스토리지 활용)
        function saveData() {
            const data = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value
            };
            localStorage.setItem('black_space_data', JSON.stringify(data));
            alert('Saved');
        }

        window.onload = () => {
            const saved = localStorage.getItem('black_space_data');
            if(saved) {
                const parsed = JSON.parse(saved);
                document.getElementById('title').value = parsed.title;
                document.getElementById('content').value = parsed.content;
            }
        };

        function showFolderModal() { document.getElementById('folder-modal').style.display = 'flex'; }
        function hideFolderModal() { document.getElementById('folder-modal').style.display = 'none'; }
        
        function createFolder() {
            const folderName = document.getElementById('folder-input').value;
            if(folderName) {
                // 폴더 간 이동 로직: 현재는 단순 파일 구조이나, 추후 fetch(path)로 확장 가능
                window.location.href = `/${folderName}/index.html`; 
            }
        }
    </script>
</body>
</html>
