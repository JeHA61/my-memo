<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACK SPACE OS</title>
    <style>
        /* [UI/UX 디자인 - 블랙 스페이스 테마] */
        :root { --bg: #000; --sidebar-bg: #0a0a0a; --list-bg: #111; --text: #fff; --sub: #666; --line: #1a1a1a; --accent: #007AFF; --danger: #FF3B30; }
        * { box-sizing: border-box; margin: 0; padding: 0; background: transparent; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* 1단: 폴더 사이드바 (좌측 정렬) */
        .folder-sidebar { width: 200px; background: var(--sidebar-bg); border-right: 1px solid var(--line); padding: 20px 10px; display: flex; flex-direction: column; }
        .sidebar-title { font-size: 11px; color: var(--sub); letter-spacing: 2px; margin-bottom: 20px; padding-left: 10px; font-weight: 800; }
        .folder-list { flex: 1; overflow-y: auto; }
        .folder-item { padding: 12px 15px; font-size: 14px; color: var(--sub); cursor: pointer; border-radius: 8px; margin-bottom: 4px; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .folder-item:hover { background: #151515; color: #eee; }
        .folder-item.active { color: #fff; background: #222; font-weight: bold; border-left: 3px solid var(--accent); }

        /* 2단: 메모 목록 (중앙) */
        .memo-list-bar { width: 280px; background: var(--list-bg); border-right: 1px solid var(--line); display: flex; flex-direction: column; }
        .memo-list-header { padding: 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
        .memo-list-container { flex: 1; overflow-y: auto; }
        .memo-item { padding: 20px; border-bottom: 1px solid var(--line); cursor: pointer; transition: 0.2s; }
        .memo-item:hover { background: #181818; }
        .memo-item.active { background: #1a1a1a; }
        .m-title { font-size: 15px; font-weight: bold; margin-bottom: 6px; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .m-date { font-size: 11px; color: #444; }

        /* 3단: 에디터 (우측) */
        .editor-view { flex: 1; display: flex; flex-direction: column; padding: 40px 60px; overflow-y: auto; position: relative; }
        #date-display { font-size: 12px; color: var(--sub); margin-bottom: 10px; font-family: monospace; }
        #title-input { border: none; color: #fff; font-size: 32px; font-weight: 700; outline: none; width: 100%; margin-bottom: 10px; }
        .divider { height: 1px; background: var(--line); margin-bottom: 25px; }
        #content-input { border: none; color: #ccc; font-size: 18px; line-height: 1.8; outline: none; width: 100%; flex: 1; resize: none; font-family: inherit; }

        /* 이미지 첨부 공간 */
        #image-preview-container { margin-bottom: 20px; display: none; }
        #image-preview-container img { max-width: 100%; border-radius: 12px; border: 1px solid #333; }

        /* [커스텀 우클릭 컨텍스트 메뉴] */
        .context-menu {
            position: fixed; background: #1c1c1e; border: 1px solid #333; border-radius: 10px;
            width: 170px; display: none; z-index: 9999; box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            padding: 6px; backdrop-filter: blur(10px);
        }
        .context-menu-item {
            padding: 10px 14px; font-size: 13px; color: #eee; cursor: pointer; border-radius: 6px;
            display: flex; justify-content: space-between; align-items: center; transition: 0.1s;
        }
        .context-menu-item:hover { background: var(--accent); color: #fff; }
        .context-menu-item.delete { color: var(--danger); }
        .context-menu-item.delete:hover { background: var(--danger); color: #fff; }

        /* 버튼 및 기타 */
        .btn-add-folder { background: #111; border: 1px solid #222; color: #888; padding: 10px; font-size: 11px; cursor: pointer; border-radius: 6px; margin-top: 10px; width: 100%; transition: 0.2s; }
        .btn-add-folder:hover { border-color: var(--accent); color: #fff; }
        .btn-add-memo { background: var(--accent); color: #fff; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-save { position: fixed; bottom: 30px; right: 30px; background: #fff; color: #000; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(255,255,255,0.1); }
        .clip-btn { cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .clip-btn:hover { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 1단: 폴더 -->
    <div class="folder-sidebar" oncontextmenu="return false;">
        <div class="sidebar-title">FOLDERS</div>
        <div id="folder-list" class="folder-list"></div>
        <button class="btn-add-folder" onclick="addFolder()">+ NEW FOLDER</button>
    </div>

    <!-- 2단: 메모 목록 -->
    <div class="memo-list-bar" oncontextmenu="return false;">
        <div class="memo-list-header">
            <span id="current-folder-label" style="font-weight: 800; font-size: 14px; color: var(--accent);">General</span>
            <button class="btn-add-memo" onclick="addMemo()">+</button>
        </div>
        <div id="memo-list-container" class="memo-list-container"></div>
    </div>

    <!-- 3단: 에디터 -->
    <main class="editor-view">
        <div id="date-display">Select or create a memo</div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <input type="text" id="title-input" placeholder="Untitled" spellcheck="false">
            <label for="file-upload" class="clip-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </label>
            <input type="file" id="file-upload" style="display:none" accept="image/*" onchange="handleImageUpload(event)">
        </div>
        <div class="divider"></div>
        <div id="image-preview-container"><img id="preview-img" src=""></div>
        <textarea id="content-input" placeholder="Start writing..." spellcheck="false"></textarea>
        <button class="btn-save" onclick="saveCurrentMemo()">SAVE CHANGES</button>
    </main>
</div>

<!-- [우클릭 메뉴] -->
<div id="folder-ctx" class="context-menu">
    <div class="context-menu-item" onclick="renameFolder()">Rename Folder</div>
    <div class="context-menu-item" onclick="pasteMemo()">Paste Memo</div>
    <div class="context-menu-item delete" onclick="deleteFolder()">Delete Folder</div>
</div>

<div id="memo-ctx" class="context-menu">
    <div class="context-menu-item" onclick="copyMemo()">Copy</div>
    <div class="context-menu-item" onclick="moveMemo()">Move to...</div>
    <div class="context-menu-item delete" onclick="deleteMemo()">Delete</div>
</div>

<script>
    // [데이터 시스템]
    let db = JSON.parse(localStorage.getItem('BLACK_SPACE_OS_DB')) || { folders: ['General'], memos: [] };
    let currentFolder = db.folders[0] || 'General';
    let currentMemoId = null;
    
    // 우클릭 제어용 변수
    let targetFolder = null;
    let targetMemoId = null;
    let memoClipboard = null;

    // 초기 실행
    window.onload = () => {
        renderFolders();
        selectFolder(currentFolder);
    };

    // [렌더링 함수]
    function renderFolders() {
        const list = document.getElementById('folder-list');
        list.innerHTML = db.folders.map(f => `
            <div class="folder-item ${f === currentFolder ? 'active' : ''}" 
                 onclick="selectFolder('${f}')" 
                 oncontextmenu="showFolderCtx(event, '${f}')"># ${f}</div>
        `).join('');
    }

    function renderMemoList() {
        const list = document.getElementById('memo-list-container');
        const filtered = db.memos.filter(m => m.folder === currentFolder);
        list.innerHTML = filtered.map(m => `
            <div class="memo-item ${m.id === currentMemoId ? 'active' : ''}" 
                 onclick="selectMemo('${m.id}')" 
                 oncontextmenu="showMemoCtx(event, '${m.id}')">
                <div class="m-title">${m.title || 'Untitled'}</div>
                <div class="m-date">${m.date.split('T')[0]}</div>
            </div>
        `).join('');
    }

    // [폴더 기능]
    function addFolder() {
        const name = prompt("Enter new folder name:");
        if(name && !db.folders.includes(name.trim())) {
            db.folders.push(name.trim());
            saveDB(); renderFolders();
        }
    }

    function renameFolder() {
        const oldName = targetFolder;
        const newName = prompt(`Rename '${oldName}' to:`, oldName);
        if(newName && newName.trim() !== "" && newName !== oldName) {
            const nextName = newName.trim();
            // DB 업데이트
            db.folders = db.folders.map(f => f === oldName ? nextName : f);
            db.memos.forEach(m => { if(m.folder === oldName) m.folder = nextName; });
            
            if(currentFolder === oldName) currentFolder = nextName;
            saveDB(); renderFolders(); selectFolder(currentFolder);
        }
    }

    function deleteFolder() {
        if(confirm(`Delete folder '${targetFolder}' and all its memos?`)) {
            db.memos = db.memos.filter(m => m.folder !== targetFolder);
            db.folders = db.folders.filter(f => f !== targetFolder);
            if(db.folders.length === 0) db.folders = ['General'];
            currentFolder = db.folders[0];
            saveDB(); renderFolders(); selectFolder(currentFolder);
        }
    }

    // [메모 기능]
    function selectFolder(name) {
        currentFolder = name;
        document.getElementById('current-folder-label').innerText = name;
        renderFolders();
        renderMemoList();
    }

    function addMemo() {
        const id = Date.now().toString();
        const newMemo = { id, folder: currentFolder, title: '', content: '', date: new Date().toISOString(), image: null };
        db.memos.unshift(newMemo);
        saveDB(); selectMemo(id);
    }

    function selectMemo(id) {
        currentMemoId = id;
        const memo = db.memos.find(m => m.id === id);
        if(!memo) return;

        document.getElementById('title-input').value = memo.title;
        document.getElementById('content-input').value = memo.content;
        document.getElementById('date-display').innerText = `LAST UPDATED: ${memo.date.replace('T', ' ').split('.')[0]}`;
        
        const imgContainer = document.getElementById('image-preview-container');
        if(memo.image) {
            document.getElementById('preview-img').src = memo.image;
            imgContainer.style.display = 'block';
        } else {
            imgContainer.style.display = 'none';
        }
        renderMemoList();
    }

    function saveCurrentMemo() {
        const memo = db.memos.find(m => m.id === currentMemoId);
        if(memo) {
            memo.title = document.getElementById('title-input').value;
            memo.content = document.getElementById('content-input').value;
            memo.date = new Date().toISOString();
            saveDB(); renderMemoList();
            alert("Saved to Black Space.");
        }
    }

    // [우클릭 액션: 복사, 붙여넣기, 이동]
    function copyMemo() {
        const memo = db.memos.find(m => m.id === targetMemoId);
        memoClipboard = JSON.stringify(memo);
        alert("Memo copied.");
    }

    function pasteMemo() {
        if(!memoClipboard) return alert("Clipboard is empty.");
        const newMemo = JSON.parse(memoClipboard);
        newMemo.id = Date.now().toString();
        newMemo.folder = targetFolder; // 우클릭한 폴더로 지정
        newMemo.date = new Date().toISOString();
        db.memos.unshift(newMemo);
        saveDB(); 
        if(currentFolder === targetFolder) renderMemoList();
        alert(`Pasted to ${targetFolder}`);
    }

    function moveMemo() {
        const target = prompt(`Enter target folder name: (${db.folders.join(', ')})`);
        if(target && db.folders.includes(target)) {
            const memo = db.memos.find(m => m.id === targetMemoId);
            memo.folder = target;
            saveDB(); renderMemoList();
            alert(`Moved to ${target}`);
        }
    }

    function deleteMemo() {
        if(confirm("Delete this memo?")) {
            db.memos = db.memos.filter(m => m.id !== targetMemoId);
            if(currentMemoId === targetMemoId) {
                currentMemoId = null;
                document.getElementById('title-input').value = '';
                document.getElementById('content-input').value = '';
            }
            saveDB(); renderMemoList();
        }
    }

    // [이미지 처리]
    function handleImageUpload(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const memo = db.memos.find(m => m.id === currentMemoId);
            if(memo) {
                memo.image = ev.target.result;
                document.getElementById('preview-img').src = memo.image;
                document.getElementById('image-preview-container').style.display = 'block';
            }
        };
        reader.readAsDataURL(file);
    }

    // [우클릭 메뉴 제어]
    function showFolderCtx(e, folder) {
        e.preventDefault();
        targetFolder = folder;
        const ctx = document.getElementById('folder-ctx');
        ctx.style.display = 'block';
        ctx.style.left = e.pageX + 'px';
        ctx.style.top = e.pageY + 'px';
    }

    function showMemoCtx(e, id) {
        e.preventDefault();
        targetMemoId = id;
        const ctx = document.getElementById('memo-ctx');
        ctx.style.display = 'block';
        ctx.style.left = e.pageX + 'px';
        ctx.style.top = e.pageY + 'px';
    }

    document.addEventListener('click', () => {
        document.getElementById('folder-ctx').style.display = 'none';
        document.getElementById('memo-ctx').style.display = 'none';
    });

    function saveDB() { localStorage.setItem('BLACK_SPACE_OS_DB', JSON.stringify(db)); }
</script>

</body>
</html>
