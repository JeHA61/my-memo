<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACK SPACE PRO</title>
    <style>
        :root { --bg: #000; --sidebar-bg: #0a0a0a; --list-bg: #111; --text: #fff; --sub: #666; --line: #1a1a1a; --accent: #007AFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; background: transparent; }
        body, html { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* 1단: 폴더 목록 (가장 왼쪽) */
        .folder-sidebar { width: 180px; background: var(--sidebar-bg); border-right: 1px solid var(--line); padding: 20px 10px; }
        .sidebar-title { font-size: 11px; color: var(--sub); letter-spacing: 1px; margin-bottom: 20px; padding-left: 10px; }
        .folder-item { padding: 10px; font-size: 14px; color: var(--sub); cursor: pointer; border-radius: 6px; margin-bottom: 5px; }
        .folder-item:hover { background: #1a1a1a; }
        .folder-item.active { color: #fff; background: #222; font-weight: bold; }

        /* 2단: 메모 목록 (중간) */
        .memo-list-bar { width: 240px; background: var(--list-bg); border-right: 1px solid var(--line); display: flex; flex-direction: column; }
        .memo-list-header { padding: 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
        .memo-item { padding: 20px; border-bottom: 1px solid var(--line); cursor: pointer; transition: 0.2s; }
        .memo-item:hover { background: #1a1a1a; }
        .memo-item.active { background: #1a1a1a; border-left: 3px solid var(--accent); }
        .memo-item .m-title { font-size: 15px; font-weight: bold; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .memo-item .m-desc { font-size: 12px; color: var(--sub); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* 3단: 메모 에디터 (오른쪽) */
        .editor-view { flex: 1; display: flex; flex-direction: column; padding: 40px 60px; overflow-y: auto; }
        #title-input { border: none; color: #fff; font-size: 32px; font-weight: 700; outline: none; width: 100%; margin-bottom: 10px; }
        .divider { height: 1px; background: var(--line); margin-bottom: 30px; }
        #content-input { border: none; color: #ccc; font-size: 18px; line-height: 1.8; outline: none; width: 100%; flex: 1; resize: none; }

        /* 공통 버튼 */
        .btn-add { background: none; border: 1px solid #333; color: #888; padding: 5px 10px; font-size: 11px; cursor: pointer; border-radius: 4px; }
        .btn-save { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: #fff; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,122,255,0.3); }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 1단: 폴더 -->
    <div class="folder-sidebar">
        <div class="sidebar-title">FOLDERS</div>
        <div id="folder-list">
            <!-- 폴더 항목이 여기 동적으로 추가됨 -->
        </div>
        <button class="btn-add" onclick="addFolder()" style="margin-top: 20px; width: 100%;">+ NEW FOLDER</button>
    </div>

    <!-- 2단: 메모 목록 -->
    <div class="memo-list-bar">
        <div class="memo-list-header">
            <span id="current-folder-name" style="font-weight: bold;">Select Folder</span>
            <button class="btn-add" onclick="addMemo()">+</button>
        </div>
        <div id="memo-list-container" style="overflow-y: auto; flex: 1;">
            <!-- 메모 항목이 여기 동적으로 추가됨 -->
        </div>
    </div>

    <!-- 3단: 에디터 -->
    <main class="editor-view">
        <input type="text" id="title-input" placeholder="Untitled" spellcheck="false">
        <div class="divider"></div>
        <textarea id="content-input" placeholder="Start writing..." spellcheck="false"></textarea>
        <button class="btn-save" onclick="saveCurrentMemo()">SAVE DATA</button>
    </main>
</div>

<script>
    // 데이터 구조: { folders: ['Daily', 'Work'], memos: [{id, folder, title, content, date}] }
    let db = JSON.parse(localStorage.getItem('BLACK_SPACE_DB')) || {
        folders: ['General'],
        memos: []
    };

    let currentFolder = 'General';
    let currentMemoId = null;

    // 초기 실행
    window.onload = () => {
        renderFolders();
        selectFolder('General');
    };

    // [기능] 폴더 렌더링
    function renderFolders() {
        const list = document.getElementById('folder-list');
        list.innerHTML = db.folders.map(f => `
            <div class="folder-item ${f === currentFolder ? 'active' : ''}" onclick="selectFolder('${f}')">
                # ${f}
            </div>
        `).join('');
    }

    // [기능] 폴더 선택 (404 오류 해결: 페이지 이동 안함)
    function selectFolder(folderName) {
        currentFolder = folderName;
        document.getElementById('current-folder-name').innerText = folderName;
        renderFolders();
        renderMemoList();
    }

    // [기능] 폴더 추가
    function addFolder() {
        const name = prompt("Enter folder name:");
        if(name && !db.folders.includes(name)) {
            db.folders.push(name);
            saveToStorage();
            renderFolders();
        }
    }

    // [기능] 메모 목록 렌더링
    function renderMemoList() {
        const list = document.getElementById('memo-list-container');
        const filtered = db.memos.filter(m => m.folder === currentFolder);
        
        list.innerHTML = filtered.map(m => `
            <div class="memo-item ${m.id === currentMemoId ? 'active' : ''}" onclick="selectMemo('${m.id}')">
                <div class="m-title">${m.title || 'Untitled'}</div>
                <div class="m-desc">${m.content.substring(0, 40) || 'No content...'}</div>
            </div>
        `).join('');
    }

    // [기능] 메모 선택 및 표시
    function selectMemo(id) {
        currentMemoId = id;
        const memo = db.memos.find(m => m.id === id);
        if(memo) {
            document.getElementById('title-input').value = memo.title;
            document.getElementById('content-input').value = memo.content;
            renderMemoList();
        }
    }

    // [기능] 새 메모 추가
    function addMemo() {
        const newId = Date.now().toString();
        const newMemo = {
            id: newId,
            folder: currentFolder,
            title: '',
            content: '',
            date: new Date().toISOString()
        };
        db.memos.unshift(newMemo);
        saveToStorage();
        selectMemo(newId);
    }

    // [기능] 저장
    function saveCurrentMemo() {
        if(!currentMemoId) return alert("Select or create a memo first.");
        
        const memo = db.memos.find(m => m.id === currentMemoId);
        if(memo) {
            memo.title = document.getElementById('title-input').value;
            memo.content = document.getElementById('content-input').value;
            memo.date = new Date().toISOString();
            saveToStorage();
            renderMemoList();
            
            const btn = document.querySelector('.btn-save');
            btn.innerText = "SAVED!";
            setTimeout(() => btn.innerText = "SAVE DATA", 1500);
        }
    }

    function saveToStorage() {
        localStorage.setItem('BLACK_SPACE_DB', JSON.stringify(db));
    }
</script>

</body>
</html>
