<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>BLACK SPACE</title>
    <style>
        :root { --bg: #000; --text: #fff; --sub: #444; --line: #1a1a1a; --accent: #007AFF; }
        * { box-sizing: border-box; background: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }

        /* [UI 개선] 모든 요소 왼쪽 정렬 레이아웃 */
        .app-wrapper { display: flex; height: 100%; }

        /* 왼쪽 폴더 사이드바 (필요할 때만 노출 가능) */
        .sidebar { width: 200px; border-right: 1px solid var(--line); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .folder-item { color: var(--sub); cursor: pointer; font-size: 14px; text-align: left; transition: 0.2s; }
        .folder-item.active { color: var(--text); font-weight: bold; }

        /* 메인 컨텐츠 영역 */
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 0 30px; }

        /* 상단 바 - 왼쪽 정렬 */
        .header { height: 60px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid var(--line); }
        .btn { border: none; color: var(--sub); font-size: 13px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-active { color: var(--text); font-weight: bold; }

        /* 에디터 영역 - 왼쪽 정렬 */
        .editor-container { flex: 1; display: flex; flex-direction: column; padding-top: 40px; }
        #title { border: none; color: var(--text); font-size: 32px; font-weight: 700; outline: none; width: 100%; padding-bottom: 10px; text-align: left; }
        
        /* 제목-본문 구분선 */
        .divider { height: 1px; background: var(--line); margin-bottom: 25px; width: 100%; }

        #content { border: none; color: #888; font-size: 18px; line-height: 1.7; outline: none; width: 100%; flex: 1; resize: none; text-align: left; }

        /* 폴더 생성 팝업 */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: flex-start; padding-left: 50px; }
        .modal-box { background: #111; padding: 25px; border: 1px solid var(--line); width: 280px; text-align: left; }
        .modal-box input { width: 100%; background: #000; border: 1px solid var(--line); color: #fff; padding: 10px; margin-bottom: 15px; outline: none; }
        .modal-box button { background: var(--accent); color: white; border: none; padding: 8px 15px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <!-- 메인 화면 -->
        <div class="main-content">
            <div class="header">
                <button class="btn btn-active" onclick="toggleModal(true)">+ NEW FOLDER</button>
                <button class="btn" onclick="saveMemo()" id="save-status">SAVE</button>
                <span id="current-folder-display" style="font-size: 12px; color: #444; margin-left: auto;">FOLDER: Default</span>
            </div>

            <div class="editor-container">
                <input type="text" id="title" placeholder="Title" spellcheck="false">
                <div class="divider"></div>
                <textarea id="content" placeholder="Type your story..." spellcheck="false"></textarea>
            </div>
        </div>
    </div>

    <!-- 폴더 생성 모달 -->
    <div id="modal" onclick="if(event.target==this) toggleModal(false)">
        <div class="modal-box">
            <p style="font-size: 12px; color: #888; margin-bottom: 10px;">ENTER FOLDER NAME</p>
            <input type="text" id="new-folder-input" placeholder="Work, Daily, etc.">
            <button onclick="createNewFolder()">CREATE & MOVE</button>
        </div>
    </div>

    <script>
        let currentFolderName = "Default";

        // [해결] 404 없이 가상 폴더 이동
        function createNewFolder() {
            const folderInput = document.getElementById('new-folder-input');
            if (folderInput.value.trim() !== "") {
                currentFolderName = folderInput.value.trim();
                
                // 화면 업데이트
                document.getElementById('current-folder-display').innerText = `FOLDER: ${currentFolderName}`;
                
                // 기존 내용 초기화 (새 폴더로 이동했으므로)
                document.getElementById('title').value = "";
                document.getElementById('content').value = "";
                
                toggleModal(false);
                folderInput.value = "";
                console.log(`Moved to virtual folder: ${currentFolderName}`);
            }
        }

        function toggleModal(show) {
            document.getElementById('modal').style.display = show ? 'flex' : 'none';
        }

        // 보안 저장 로직 (LocalStorage 활용)
        function saveMemo() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            
            const memoData = {
                folder: currentFolderName,
                title: title,
                content: content,
                updatedAt: new Date().toISOString()
            };

            // 폴더 이름을 키값으로 포함하여 저장 (iCloud 동기화 대상)
            localStorage.setItem(`memo_${currentFolderName}`, JSON.stringify(memoData));
            
            const btn = document.getElementById('save-status');
            btn.innerText = "SAVED!";
            btn.style.color = "#007AFF";
            setTimeout(() => {
                btn.innerText = "SAVE";
                btn.style.color = "#444";
            }, 2000);
        }

        // 페이지 로드 시 마지막 작업 폴더 불러오기
        window.onload = () => {
            const lastData = localStorage.getItem(`memo_${currentFolderName}`);
            if (lastData) {
                const parsed = JSON.parse(lastData);
                document.getElementById('title').value = parsed.title;
                document.getElementById('content').value = parsed.content;
            }
        };
    </script>
</body>
</html>
