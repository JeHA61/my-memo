<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACK MEMO</title>
    <style>
        /* [레이아웃 고수] 127.0.0.1:5500에서 보던 기존 디자인 그대로 유지 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* 완전한 검은색 배경 */
            color: #fff;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        /* 상단 바: 기존 디자인의 깔끔함 유지 */
        .header {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #222;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: -0.5px;
        }

        .actions {
            display: flex;
            gap: 15px;
        }

        /* 기능 버튼: 디자인을 해치지 않는 미니멀한 스타일 */
        .action-btn {
            background: none;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .action-btn:active {
            background-color: #222;
        }

        /* 메모 입력창: 전체 화면 레이아웃 */
        #memo-editor {
            width: 100%;
            height: calc(100% - 60px);
            background: transparent;
            color: #fff;
            border: none;
            padding: 20px;
            font-size: 16px;
            line-height: 1.6;
            outline: none;
            resize: none;
            box-sizing: border-box;
        }

        /* 파일 입력 숨김 처리 */
        #file-input {
            display: none;
        }

        /* 첨부 이미지 미리보기 (기존 레이아웃 방해 금지) */
        #preview-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            pointer-events: none;
        }

        .preview-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">BLACK MEMO</div>
        <div class="actions">
            <!-- 사용자가 요구한 첨부파일 및 저장 버튼 복구 -->
            <button class="action-btn" onclick="document.getElementById('file-input').click()">첨부</button>
            <button class="action-btn" onclick="saveMemo()">저장</button>
        </div>
    </div>

    <!-- 메모 작성 영역 -->
    <textarea id="memo-editor" placeholder="기록을 시작하세요..."></textarea>
    
    <!-- 파일 처리 레이어 -->
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)">
    <div id="preview-container"></div>

    <script>
        const editor = document.getElementById('memo-editor');

        // [기능 1] 페이지 접속 시 저장된 메모 불러오기
        window.onload = () => {
            const savedData = localStorage.getItem('black_memo_data');
            if (savedData) {
                editor.value = savedData;
            }
        };

        // [기능 2] 저장 버튼 클릭 시 브라우저에 즉시 저장
        function saveMemo() {
            const content = editor.value;
            localStorage.setItem('black_memo_data', content);
            alert('성공적으로 저장되었습니다.');
        }

        // [기능 3] 첨부파일 기능 구현 (이미지 선택 시 미리보기)
        function handleFiles(files) {
            const container = document.getElementById('preview-container');
            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-img';
                    container.appendChild(img);
                }
                reader.readAsDataURL(files[i]);
            }
        }

        // [추가 보안] 작성 중 창을 닫아도 날아가지 않게 자동 저장
        editor.addEventListener('input', () => {
            localStorage.setItem('black_memo_data', editor.value);
        });
    </script>
</body>
</html>
