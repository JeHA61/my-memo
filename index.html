<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- 보안성 강화 (CSP): 외부 스크립트 차단 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline';">
    <link rel="manifest" href="manifest.json">
    <title>BLACK SPACE</title>
    <style>
        /* 127.0.0.1:5500 오리지널 레이아웃 복제 */
        :root { --bg: #000; --text: #fff; --sub: #666; --line: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100%; overflow: hidden; }

        /* 상단 바 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--line); height: 60px; }
        .btn { background: none; border: none; font-size: 14px; cursor: pointer; padding: 5px; transition: 0.2s; }
        .btn-folder { color: var(--sub); }
        .btn-save { color: var(--text); font-weight: 600; }

        /* 에디터 메인 */
        .container { display: flex; flex-direction: column; height: calc(100% - 60px); padding: 25px 20px; }
        
        /* 제목 영역 */
        #title { background: none; border: none; color: var(--text); font-size: 28px; font-weight: 700; outline: none; width: 100%; padding-bottom: 15px; }

        /* [요구사항] 제목-본문 구분선 */
        .divider { height: 1px; background: var(--line); margin-bottom: 20px; }

        /* 본문 영역 */
        #content { background: none; border: none; color: #ccc; font-size: 17px; line-height: 1.6; outline: none; width: 100%; flex: 1; resize: none; }

        /* 폴더 모달 (디자인 최소화) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-inner { width: 80%; max-width: 300px; text-align: center; }
        .modal-inner input { width: 100%; background: #111; border: 1px solid var(--line); color: #fff; padding: 12px; margin-bottom: 20px; outline: none; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 10px; background: none; border: 1px solid var(--line); color: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <button class="btn btn-folder" onclick="toggleModal(true)">+ NEW FOLDER</button>
        <button class="btn btn-save" onclick="saveMemo()">SAVE</button>
    </div>

    <div class="container">
        <input type="text" id="title" placeholder="Title" spellcheck="false">
        <div class="divider"></div>
        <textarea id="content" placeholder="Writing..." spellcheck="false"></textarea>
    </div>

    <!-- 폴더 이동/생성 모달 -->
    <div id="modal" onclick="if(event.target==this) toggleModal(false)">
        <div class="modal-inner">
            <input type="text" id="folder-name" placeholder="Folder Name">
            <div class="modal-btns">
                <button onclick="toggleModal(false)">CLOSE</button>
                <button onclick="moveFolder()" style="background: #fff; color: #000;">MOVE</button>
            </div>
        </div>
    </div>

    <script>
        // [기능 1] 폴더 간 이동 로직
        // 정적 페이지에서 폴더 이동은 URL 경로 변경으로 구현
        function moveFolder() {
            const folder = document.getElementById('folder-name').value;
            if(folder) {
                // 현재 경로를 기반으로 해당 폴더 내의 index.html로 이동
                window.location.href = `./${folder}/index.html`;
            }
        }

        function toggleModal(show) {
            document.getElementById('modal').style.display = show ? 'flex' : 'none';
        }

        // [기능 2] 보안 및 로컬 저장 (iCloud 동기화 기반)
        function saveMemo() {
            const data = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                time: new Date().getTime()
            };
            localStorage.setItem('black_space_current', JSON.stringify(data));
            alert('Saved to Local Storage');
        }

        // 페이지 로드 시 데이터 복구
        window.onload = () => {
            const saved = localStorage.getItem('black_space_current');
            if(saved) {
                const parsed = JSON.parse(saved);
                document.getElementById('title').value = parsed.title;
                document.getElementById('content').value = parsed.content;
            }
        };

        // PWA 서비스 워커 등록 (앱 설치용)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
