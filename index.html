<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BLACK SPACE OS">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icon.svg">
    <title>BLACK SPACE OS - Monochrome Edition</title>
    <style>
        /* [디자인 시스템 - 무채색 & 블랙] */
        :root {
            --bg: #000;
            --sidebar-bg: #0a0a0a;
            --list-bg: #111;
            --text: #fff;
            --sub: #777;
            --line: #222;
            --accent: #ffffff; /* 화이트 포인트 */
            --hover: #1a1a1a;
            --danger: #333; /* 삭제 등 위험 요소도 무채색으로 유지 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; background: transparent; }
        body, html { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* 1단: 폴더 사이드바 */
        .folder-sidebar { width: 190px; background: var(--sidebar-bg); border-right: 1px solid var(--line); padding: 20px 12px; display: flex; flex-direction: column; }
        .folder-sidebar-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding: 0 4px 0 10px; }
        .sidebar-title { font-size: 11px; color: var(--sub); letter-spacing: 2px; font-weight: bold; }
        .folder-list { flex: 1; overflow-y: auto; }
        .folder-item { padding: 12px 15px; font-size: 13px; color: var(--sub); cursor: pointer; border-radius: 6px; margin-bottom: 4px; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .folder-item:hover { background: var(--hover); color: #fff; }
        .folder-item.active { color: #fff; background: #222; font-weight: bold; }

        /* 2단: 메모 목록 */
        .memo-list-bar { width: 270px; background: var(--list-bg); border-right: 1px solid var(--line); display: flex; flex-direction: column; }
        .memo-list-header { padding: 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
        #current-folder-label { font-size: 13px; font-weight: bold; color: #fff; }
        .memo-list-container { flex: 1; overflow-y: auto; }
        .memo-item { padding: 20px; border-bottom: 1px solid var(--line); cursor: pointer; transition: 0.2s; }
        .memo-item:hover { background: var(--hover); }
        .memo-item.active { background: #181818; border-left: 2px solid var(--accent); }
        .m-title { font-size: 14px; font-weight: bold; margin-bottom: 6px; color: #eee; }
        .m-date { font-size: 11px; color: #444; font-family: monospace; }

        /* 3단: 에디터 */
        .editor-view { flex: 1; display: flex; flex-direction: column; padding: 50px 70px; overflow-y: auto; position: relative; }
        #date-display { font-size: 11px; color: var(--sub); margin-bottom: 12px; font-family: monospace; }
        #title-input { border: none; color: #fff; font-size: 34px; font-weight: 700; outline: none; width: 100%; margin-bottom: 10px; }
        .divider { height: 1px; background: var(--line); margin-bottom: 30px; }
        #content-input { border: none; color: #bbb; font-size: 17px; line-height: 1.9; outline: none; width: 100%; flex: 1; resize: none; }

        /* 이미지 첨부 */
        #image-preview-container { margin-bottom: 25px; display: none; }
        #image-preview-container img { max-width: 100%; border-radius: 4px; filter: grayscale(0.5); border: 1px solid var(--line); }

        /* [커스텀 우클릭 메뉴] */
        .context-menu {
            position: fixed; background: #181818; border: 1px solid #333; border-radius: 8px;
            width: 160px; display: none; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            padding: 5px;
        }
        .context-menu-item {
            padding: 10px 12px; font-size: 13px; color: #bbb; cursor: pointer; border-radius: 4px; transition: 0.1s;
        }
        .context-menu-item:hover { background: #333; color: #fff; }
        .context-menu-item.delete { color: #777; }
        .context-menu-item.delete:hover { background: #442222; color: #ff5555; }
        .context-menu-item.label { cursor: default; color: #5f5f5f; font-size: 10px; letter-spacing: 1px; padding-top: 8px; padding-bottom: 4px; }
        .context-menu-item.label:hover { background: transparent; color: #5f5f5f; }
        .context-menu-item.move-empty { cursor: default; color: #555; }
        .context-menu-item.move-empty:hover { background: transparent; color: #555; }

        /* 공통 버튼 */
        .btn-add-folder { background: #111; border: 1px solid #2b2b2b; color: #888; width: 26px; height: 26px; font-size: 16px; line-height: 1; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .btn-add-folder:hover { border-color: #555; color: #fff; background: #191919; }
        .btn-add-memo { background: #222; color: #fff; border: 1px solid #333; width: 26px; height: 26px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn-add-memo:hover { background: #fff; color: #000; }
        .clip-btn { cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .clip-btn:hover { opacity: 1; }

        /* GitHub sync controls (corner, low distraction) */
        .sync-fab {
            position: fixed;
            left: 22px;
            bottom: 28px;
            z-index: 1200;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-start;
        }
        .sync-main-btn {
            border: 1px solid #333;
            background: #111;
            color: #999;
            border-radius: 4px;
            font-size: 10px;
            letter-spacing: 1px;
            padding: 8px 12px;
            cursor: pointer;
        }
        .sync-main-btn:hover { color: #fff; border-color: #555; }
        .sync-panel {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: rgba(0, 0, 0, 0.92);
            border: 1px solid #222;
            border-radius: 6px;
            padding: 8px;
            min-width: 78px;
        }
        .sync-panel.open { display: flex; }
        .sync-action-btn {
            border: 1px solid #2b2b2b;
            background: #101010;
            color: #8b8b8b;
            border-radius: 4px;
            font-size: 10px;
            letter-spacing: 0.8px;
            padding: 8px 10px;
            cursor: pointer;
            text-align: left;
        }
        .sync-action-btn:hover { color: #fff; border-color: #555; background: #161616; }

        @media (max-width: 768px) {
            .sync-fab { left: 14px; bottom: 16px; }
            .sync-main-btn { font-size: 9px; padding: 7px 10px; }
            .sync-action-btn { font-size: 10px; padding: 9px 10px; }
        }

        /* App-only layout (PWA standalone, editor-first + left menu) */
        body.app-mode { overflow: hidden; background: #000; }
        body.app-mode .app-container { height: 100dvh; width: 100vw; display: block; background: #000; }
        body.app-mode .editor-view {
            position: fixed;
            top: env(safe-area-inset-top);
            left: 0;
            right: 0;
            bottom: env(safe-area-inset-bottom);
            padding: 62px 18px 18px;
            background: #000;
            overflow-y: auto;
            z-index: 1100;
        }
        body.app-mode #date-display { margin-bottom: 8px; color: #666; }
        body.app-mode #title-input { font-size: 31px; margin-bottom: 8px; letter-spacing: -0.2px; }
        body.app-mode .divider { margin-bottom: 18px; }
        body.app-mode #content-input { font-size: 18px; line-height: 1.82; color: #c7c7c7; }
        body.app-mode .clip-btn { opacity: 0.28; }

        .app-panel-toggle,
        .app-panel-backdrop { display: none; }
        body.app-mode .app-panel-toggle {
            display: block;
            position: fixed;
            top: calc(env(safe-area-inset-top) + 12px);
            left: 12px;
            width: 36px;
            height: 36px;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            background: rgba(8, 8, 8, 0.9);
            color: #b5b5b5;
            font-size: 17px;
            line-height: 1;
            z-index: 1510;
            cursor: pointer;
            backdrop-filter: blur(6px);
        }
        body.app-mode .app-panel-toggle:hover { color: #fff; border-color: #555; }
        body.app-mode .app-panel-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.62);
            z-index: 1400;
        }
        body.app-mode.app-panel-open .app-panel-backdrop { display: block; }
        body.app-mode .folder-sidebar,
        body.app-mode .memo-list-bar {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 58px);
            bottom: calc(env(safe-area-inset-bottom) + 10px);
            border: 1px solid #1f1f1f;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.65);
            display: flex;
            z-index: 1450;
            transform: translateX(-112%);
            transition: transform 0.22s ease;
        }
        body.app-mode .folder-sidebar {
            left: 10px;
            width: 33%;
            min-width: 122px;
            padding: 12px 8px;
            background: #060606;
        }
        body.app-mode .memo-list-bar {
            left: calc(10px + 33% + 8px);
            right: 10px;
            width: auto;
            background: #0c0c0c;
        }
        body.app-mode.app-panel-open .folder-sidebar,
        body.app-mode.app-panel-open .memo-list-bar { transform: translateX(0); }
        body.app-mode .memo-list-header { padding: 12px 12px; }
        body.app-mode .memo-item { padding: 14px 12px; }
        body.app-mode .folder-item { padding: 11px 11px; }
        body.app-mode .folder-sidebar-head { margin-bottom: 12px; padding: 0 2px; }

        body.app-mode .sync-fab {
            left: auto;
            right: 10px;
            bottom: calc(env(safe-area-inset-bottom) + 10px);
            z-index: 1520;
            opacity: 0.62;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        body.app-mode.app-writing .sync-fab {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 1단 -->
    <div id="folder-sidebar" class="folder-sidebar" oncontextmenu="return false;">
        <div class="folder-sidebar-head">
            <div class="sidebar-title">FOLDERS</div>
            <button class="btn-add-folder" onclick="addFolder()" title="Add folder" aria-label="Add folder">+</button>
        </div>
        <div id="folder-list" class="folder-list"></div>
    </div>

    <!-- 2단 -->
    <div id="memo-list-bar" class="memo-list-bar" oncontextmenu="return false;">
        <div class="memo-list-header">
            <span id="current-folder-label">General</span>
            <button class="btn-add-memo" onclick="addMemo()">+</button>
        </div>
        <div id="memo-list-container" class="memo-list-container"></div>
    </div>

    <!-- 3단 -->
    <main class="editor-view">
        <div id="date-display">Select or create a memo</div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <input type="text" id="title-input" placeholder="Title" spellcheck="false">
            <label for="file-upload" class="clip-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </label>
            <input type="file" id="file-upload" style="display:none" accept="image/*" onchange="handleImageUpload(event)">
        </div>
        <div class="divider"></div>
        <div id="image-preview-container"><img id="preview-img" src=""></div>
        <textarea id="content-input" placeholder="Type something..." spellcheck="false"></textarea>
    </main>
</div>

<!-- 우클릭 메뉴 -->
<div id="folder-ctx" class="context-menu">
    <div class="context-menu-item" onclick="renameFolder()">Rename Folder</div>
    <div class="context-menu-item" onclick="pasteMemo()">Paste Memo</div>
    <div class="context-menu-item delete" onclick="deleteFolder()">Delete Folder</div>
</div>

<div id="memo-ctx" class="context-menu">
    <div class="context-menu-item" onclick="copyMemo()">Copy</div>
    <div class="context-menu-item label">MOVE TO</div>
    <div id="memo-move-targets"></div>
    <div class="context-menu-item delete" onclick="deleteMemo()">Delete</div>
</div>

<!-- corner sync controls -->
<div id="sync-fab" class="sync-fab">
    <button class="sync-main-btn" onclick="toggleSyncPanel(event)" title="Open GitHub sync menu">SYNC</button>
    <div id="sync-panel" class="sync-panel">
        <button class="sync-action-btn" onclick="configureGitHubSync()" title="Ctrl/Cmd+Shift+G">SET</button>
        <button class="sync-action-btn" onclick="pullFromGitHub()" title="Ctrl/Cmd+Shift+U">PULL</button>
        <button class="sync-action-btn" onclick="pushToGitHub()" title="Ctrl/Cmd+Shift+I">PUSH</button>
        <button class="sync-action-btn" onclick="syncWithGitHub()" title="Ctrl/Cmd+Shift+Y">SYNC</button>
    </div>
</div>

<button id="app-panel-toggle" class="app-panel-toggle" onclick="toggleAppPanel(event)" aria-label="Open folders and memos">☰</button>
<div id="app-panel-backdrop" class="app-panel-backdrop" onclick="closeAppPanel()"></div>

<script src="./sync.js"></script>
<script>
    const Sync = window.BlackSpaceSync || null;
    const STORAGE_KEY = 'BLACK_SPACE_OS_V2';
    const SECURITY_CONFIG_KEY = 'BLACK_SPACE_SECURITY_V1';
    const SECURITY_PASSPHRASE_KEY = 'BLACK_SPACE_SESSION_PASSPHRASE';
    const SECURITY_TOKEN_VAULT_KEY = 'BLACK_SPACE_TOKEN_VAULT';
    const SECURITY_ITERATIONS = 250000;

    let db = loadLocalDb();
    let securityConfig = loadSecurityConfig();
    let sessionPassphrase = loadSessionPassphrase();
    let currentFolder = db.folders[0] || 'General';
    let currentMemoId = null;
    let targetFolder = null;
    let targetMemoId = null;
    let memoClipboard = null;
    let remoteFileSha = null;
    let autoSaveTimer = null;
    const AUTO_SAVE_DELAY_MS = 700;
    const LONG_PRESS_MS = 480;
    const LONG_PRESS_MOVE_PX = 12;
    let longPressTimer = null;
    let longPressState = null;
    let suppressNextTapFolder = null;
    let suppressNextTapMemo = null;
    let autoSyncIntervalId = null;
    let autoSyncInFlight = false;
    const AUTO_SYNC_INTERVAL_MS = 45000;
    let cloudSyncTimer = null;
    const CLOUD_SYNC_DEBOUNCE_MS = 2500;
    let isAppMode = false;
    let appPanelOpen = false;

    window.onload = async () => {
        initializeAppMode();
        setupAppPanelBindings();
        if (!db.folders.includes(currentFolder)) currentFolder = db.folders[0] || 'General';
        renderFolders();
        selectFolder(currentFolder);
        setupAutoSaveBindings();
        setupLongPressBindings();
        await unlockSecurityForSession();
        setupAutoSyncBindings();
        registerServiceWorker();
    };

    function loadLocalDb() {
        let parsed = null;
        try {
            parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
        } catch (_err) {
            parsed = null;
        }
        if (Sync) return Sync.normalizeDb(parsed);
        return parsed || { folders: ['General'], memos: [], memoTombstones: {}, lastSyncedAt: null };
    }

    function saveDB() {
        if (Sync) db = Sync.normalizeDb(db);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }

    function escapeHtml(text) {
        return String(text || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function escapeJsSingle(text) {
        return String(text || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function setFolderState(nextFolder) {
        currentFolder = nextFolder;
        document.getElementById('current-folder-label').innerText = nextFolder;
    }

    function setAppWritingMode(isWriting) {
        if (!isAppMode) return;
        if (isWriting) document.body.classList.add('app-writing');
        else document.body.classList.remove('app-writing');
    }

    function detectStandaloneApp() {
        const mediaStandalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches;
        const iosStandalone = window.navigator && window.navigator.standalone === true;
        return mediaStandalone || iosStandalone;
    }

    function openAppPanel() {
        if (!isAppMode) return;
        appPanelOpen = true;
        document.body.classList.add('app-panel-open');
    }

    function closeAppPanel() {
        appPanelOpen = false;
        document.body.classList.remove('app-panel-open');
    }

    function toggleAppPanel(event) {
        if (!isAppMode) return;
        if (event) event.stopPropagation();
        if (appPanelOpen) closeAppPanel();
        else openAppPanel();
    }

    function initializeAppMode() {
        isAppMode = detectStandaloneApp();
        if (!isAppMode) {
            document.body.classList.remove('app-mode', 'app-panel-open', 'app-writing');
            return;
        }

        document.body.classList.add('app-mode');
        closeAppPanel();

        if (window.matchMedia) {
            const mq = window.matchMedia('(display-mode: standalone)');
            if (mq && typeof mq.addEventListener === 'function') {
                mq.addEventListener('change', () => {
                    const next = detectStandaloneApp();
                    if (!next) {
                        isAppMode = false;
                        closeAppPanel();
                        document.body.classList.remove('app-mode', 'app-writing');
                        return;
                    }
                    isAppMode = true;
                    document.body.classList.add('app-mode');
                    closeAppPanel();
                });
            }
        }
    }

    function setupAppPanelBindings() {
        const folderSidebar = document.getElementById('folder-sidebar');
        const memoListBar = document.getElementById('memo-list-bar');
        const syncFab = document.getElementById('sync-fab');
        const panelToggle = document.getElementById('app-panel-toggle');

        [folderSidebar, memoListBar, syncFab, panelToggle].forEach((el) => {
            if (!el) return;
            el.addEventListener('click', (event) => event.stopPropagation());
        });
    }

    function toggleSyncPanel(event) {
        if (event) event.stopPropagation();
        const panel = document.getElementById('sync-panel');
        panel.classList.toggle('open');
    }

    function scheduleAutoSave() {
        if (!currentMemoId) return;
        if (autoSaveTimer) clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(() => {
            autoSaveTimer = null;
            saveCurrentMemo();
        }, AUTO_SAVE_DELAY_MS);
    }

    function flushAutoSave() {
        if (!autoSaveTimer) return;
        clearTimeout(autoSaveTimer);
        autoSaveTimer = null;
        saveCurrentMemo();
    }

    function setupAutoSaveBindings() {
        const titleInput = document.getElementById('title-input');
        const contentInput = document.getElementById('content-input');

        titleInput.addEventListener('input', scheduleAutoSave);
        contentInput.addEventListener('input', scheduleAutoSave);

        titleInput.addEventListener('blur', flushAutoSave);
        contentInput.addEventListener('blur', flushAutoSave);
        titleInput.addEventListener('focus', () => setAppWritingMode(true));
        contentInput.addEventListener('focus', () => setAppWritingMode(true));
        titleInput.addEventListener('blur', () => setAppWritingMode(false));
        contentInput.addEventListener('blur', () => setAppWritingMode(false));

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) flushAutoSave();
        });

        window.addEventListener('beforeunload', flushAutoSave);
    }

    function hasGitHubConfig() {
        if (!Sync) return false;
        const cfg = Sync.loadGitHubConfig();
        const missing = Sync.validateGitHubConfig(cfg);
        return missing.length === 0;
    }

    function triggerAutoSync(reason) {
        if (!hasGitHubConfig()) return;
        if (typeof navigator !== 'undefined' && navigator.onLine === false) return;
        if (isSecurityEnabled() && !sessionPassphrase) return;
        syncWithGitHub({ silent: true, reason: reason || 'auto' });
    }

    function scheduleCloudSync(reason) {
        if (!hasGitHubConfig()) return;
        if (cloudSyncTimer) clearTimeout(cloudSyncTimer);
        cloudSyncTimer = setTimeout(() => {
            cloudSyncTimer = null;
            triggerAutoSync(reason || 'local-change');
        }, CLOUD_SYNC_DEBOUNCE_MS);
    }

    function stopAutoSync() {
        if (!autoSyncIntervalId) return;
        clearInterval(autoSyncIntervalId);
        autoSyncIntervalId = null;
    }

    function startAutoSync() {
        stopAutoSync();
        autoSyncIntervalId = setInterval(() => {
            triggerAutoSync('interval');
        }, AUTO_SYNC_INTERVAL_MS);
    }

    function setupAutoSyncBindings() {
        startAutoSync();
        setTimeout(() => triggerAutoSync('startup'), 1200);
        window.addEventListener('online', () => triggerAutoSync('online'));
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) triggerAutoSync('visible');
        });
    }

    function registerServiceWorker() {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.register('./sw.js').catch((err) => {
            console.warn('ServiceWorker registration failed:', err);
        });
    }

    function safeStorage(type) {
        try {
            return type === 'session' ? window.sessionStorage : window.localStorage;
        } catch (_err) {
            return null;
        }
    }

    function loadSecurityConfig() {
        const local = safeStorage('local');
        const fallback = { enabled: false, salt: '', iterations: SECURITY_ITERATIONS };
        if (!local) return fallback;

        const raw = local.getItem(SECURITY_CONFIG_KEY);
        if (!raw) return fallback;

        try {
            const parsed = JSON.parse(raw) || {};
            return {
                enabled: parsed.enabled === true,
                salt: typeof parsed.salt === 'string' ? parsed.salt : '',
                iterations: Number(parsed.iterations) > 0 ? Number(parsed.iterations) : SECURITY_ITERATIONS,
            };
        } catch (_err) {
            return fallback;
        }
    }

    function saveSecurityConfig(next) {
        securityConfig = {
            enabled: next && next.enabled === true,
            salt: next && typeof next.salt === 'string' ? next.salt : '',
            iterations: next && Number(next.iterations) > 0 ? Number(next.iterations) : SECURITY_ITERATIONS,
        };
        const local = safeStorage('local');
        if (local) local.setItem(SECURITY_CONFIG_KEY, JSON.stringify(securityConfig));
        return securityConfig;
    }

    function loadSessionPassphrase() {
        const session = safeStorage('session');
        if (!session) return '';
        return session.getItem(SECURITY_PASSPHRASE_KEY) || '';
    }

    function setSessionPassphrase(passphrase) {
        const value = String(passphrase || '');
        sessionPassphrase = value;
        const session = safeStorage('session');
        if (!session) return;
        if (value) session.setItem(SECURITY_PASSPHRASE_KEY, value);
        else session.removeItem(SECURITY_PASSPHRASE_KEY);
    }

    function isSecurityEnabled() {
        return securityConfig && securityConfig.enabled === true;
    }

    function bytesToBase64(bytes) {
        let binary = '';
        for (let i = 0; i < bytes.length; i += 1) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
    }

    function base64ToBytes(base64) {
        const binary = atob(String(base64 || ''));
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes;
    }

    function randomBase64(size) {
        const bytes = new Uint8Array(size);
        crypto.getRandomValues(bytes);
        return bytesToBase64(bytes);
    }

    async function deriveEncryptionKey(passphrase, saltB64, iterations, usage) {
        const enc = new TextEncoder();
        const baseKey = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
            {
                name: 'PBKDF2',
                salt: base64ToBytes(saltB64),
                iterations: iterations || SECURITY_ITERATIONS,
                hash: 'SHA-256',
            },
            baseKey,
            { name: 'AES-GCM', length: 256 },
            false,
            usage
        );
    }

    async function createEncryptedBlob(plainText, passphrase, options) {
        const opts = options || {};
        const salt = opts.salt || randomBase64(16);
        const iterations = Number(opts.iterations) > 0 ? Number(opts.iterations) : SECURITY_ITERATIONS;
        const enc = new TextEncoder();
        const iv = new Uint8Array(12);
        crypto.getRandomValues(iv);
        const key = await deriveEncryptionKey(passphrase, salt, iterations, ['encrypt']);
        const cipherBuf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plainText));

        return {
            version: 1,
            algorithm: 'AES-GCM',
            kdf: 'PBKDF2',
            hash: 'SHA-256',
            iterations,
            salt,
            iv: bytesToBase64(iv),
            ciphertext: bytesToBase64(new Uint8Array(cipherBuf)),
        };
    }

    async function decryptEncryptedBlob(blob, passphrase) {
        const dec = new TextDecoder();
        const key = await deriveEncryptionKey(passphrase, blob.salt, blob.iterations, ['decrypt']);
        const plainBuf = await crypto.subtle.decrypt(
            { name: 'AES-GCM', iv: base64ToBytes(blob.iv) },
            key,
            base64ToBytes(blob.ciphertext)
        );
        return dec.decode(plainBuf);
    }

    function readTokenVaultBlob() {
        const local = safeStorage('local');
        if (!local) return null;
        const raw = local.getItem(SECURITY_TOKEN_VAULT_KEY);
        if (!raw) return null;
        try {
            return JSON.parse(raw);
        } catch (_err) {
            return null;
        }
    }

    function clearTokenVault() {
        const local = safeStorage('local');
        if (local) local.removeItem(SECURITY_TOKEN_VAULT_KEY);
    }

    async function saveTokenVault(token, passphrase) {
        const local = safeStorage('local');
        if (!local) return;
        const value = String(token || '').trim();
        if (!value) {
            clearTokenVault();
            return;
        }
        const blob = await createEncryptedBlob(value, passphrase, { iterations: SECURITY_ITERATIONS });
        local.setItem(SECURITY_TOKEN_VAULT_KEY, JSON.stringify(blob));
    }

    async function restoreSessionTokenFromVault(options) {
        const cfg = Sync.loadGitHubConfig();
        if (cfg.token) return true;

        const blob = readTokenVaultBlob();
        if (!blob) return false;

        const passphrase = await ensureSessionPassphrase(options);
        if (!passphrase) return false;

        try {
            const token = await decryptEncryptedBlob(blob, passphrase);
            Sync.saveGitHubConfig({ ...cfg, token }, { persistToken: false });
            return true;
        } catch (_err) {
            if (!(options && options.silent)) {
                alert('저장된 토큰 복원에 실패했습니다. 보안 키를 다시 확인해주세요.');
            }
            return false;
        }
    }

    async function unlockSecurityForSession() {
        if (!isSecurityEnabled()) return;
        const hasVault = !!readTokenVaultBlob();
        if (!hasVault) return;
        if (!sessionPassphrase) {
            await ensureSessionPassphrase({ silent: false });
        }
        if (!sessionPassphrase) return;
        await restoreSessionTokenFromVault({ silent: false });
    }

    async function encryptRemoteDbPayload(normalizedDb, passphrase) {
        const plainText = JSON.stringify({ schemaVersion: 2, db: normalizedDb });
        const payload = await createEncryptedBlob(plainText, passphrase, {
            salt: securityConfig.salt,
            iterations: securityConfig.iterations,
        });

        return {
            schemaVersion: 4,
            encrypted: true,
            ...payload,
            savedAt: new Date().toISOString(),
        };
    }

    async function decryptRemoteDbPayload(encryptedPayload, passphrase) {
        const plainText = await decryptEncryptedBlob(encryptedPayload, passphrase);
        const parsed = JSON.parse(plainText);
        if (!parsed) throw new Error('Invalid decrypted payload');
        if (parsed.db) return Sync.normalizeDb(parsed.db);
        return Sync.normalizeDb(parsed);
    }

    async function ensureSessionPassphrase(options) {
        if (!isSecurityEnabled()) return '';
        if (sessionPassphrase) return sessionPassphrase;

        const opts = options || {};
        if (opts.silent) return '';

        const input = prompt('보안 키(암호)를 입력하세요. 이 키 없이는 메모를 복호화할 수 없습니다:');
        if (input === null) return '';
        const next = String(input).trim();
        if (!next) return '';
        setSessionPassphrase(next);
        return next;
    }

    async function parseRemoteDbText(contentText, options) {
        if (!contentText) return null;
        let parsed = null;
        try {
            parsed = JSON.parse(contentText);
        } catch (_err) {
            parsed = null;
        }

        if (parsed && parsed.encrypted === true) {
            const passphrase = await ensureSessionPassphrase(options);
            if (!passphrase) throw new Error('보안 키가 없어 암호화된 메모를 열 수 없습니다.');
            try {
                return await decryptRemoteDbPayload(parsed, passphrase);
            } catch (_err) {
                throw new Error('암호화된 메모 해독에 실패했습니다. 보안 키를 확인하세요.');
            }
        }

        const plain = Sync.parseRemotePayload(contentText);
        if (!plain) throw new Error('Remote notes file format is invalid.');
        return Sync.normalizeDb(plain);
    }

    async function encodeRemoteDbText(normalizedDb, options) {
        if (!isSecurityEnabled()) {
            return Sync.serializeRemotePayload(normalizedDb);
        }
        const passphrase = await ensureSessionPassphrase(options);
        if (!passphrase) throw new Error('보안 키가 없어 암호화 저장을 진행할 수 없습니다.');
        const encrypted = await encryptRemoteDbPayload(normalizedDb, passphrase);
        return JSON.stringify(encrypted, null, 2);
    }

    async function readRemoteDb(config, options) {
        const file = await Sync.getRemoteFile(config);
        if (!file.exists) return { exists: false, sha: null, db: null };
        const remoteDb = await parseRemoteDbText(file.content, options);
        return { exists: true, sha: file.sha, db: Sync.normalizeDb(remoteDb) };
    }

    async function writeRemoteDb(config, nextDb, sha, message, options) {
        const normalized = Sync.normalizeDb(nextDb);
        normalized.lastSyncedAt = new Date().toISOString();
        const text = await encodeRemoteDbText(normalized, options);
        const result = await Sync.putRemoteFile(config, text, sha, message);
        return { sha: result.sha, db: normalized };
    }

    function bindLongPress(container, itemSelector, dataKey, onLongPress) {
        if (!container) return;

        container.addEventListener(
            'touchstart',
            (event) => {
                const item = event.target.closest(itemSelector);
                if (!item) return;
                const key = item.getAttribute(dataKey);
                if (!key) return;
                const touch = event.touches && event.touches[0];
                if (!touch) return;

                clearLongPressTimer();
                longPressState = {
                    key,
                    startX: touch.pageX,
                    startY: touch.pageY,
                    triggered: false,
                };

                longPressTimer = setTimeout(() => {
                    if (!longPressState || longPressState.key !== key) return;
                    longPressState.triggered = true;
                    onLongPress(key, longPressState.startX, longPressState.startY);
                }, LONG_PRESS_MS);
            },
            { passive: true }
        );

        container.addEventListener(
            'touchmove',
            (event) => {
                if (!longPressState) return;
                const touch = event.touches && event.touches[0];
                if (!touch) return;
                const dx = Math.abs(touch.pageX - longPressState.startX);
                const dy = Math.abs(touch.pageY - longPressState.startY);
                if (dx > LONG_PRESS_MOVE_PX || dy > LONG_PRESS_MOVE_PX) {
                    clearLongPressTimer();
                    longPressState = null;
                }
            },
            { passive: true }
        );

        const touchEndHandler = (event) => {
            if (!longPressState) return;
            const wasTriggered = longPressState.triggered;
            clearLongPressTimer();
            longPressState = null;
            if (wasTriggered) {
                event.preventDefault();
                event.stopPropagation();
            }
        };

        container.addEventListener('touchend', touchEndHandler, { passive: false });
        container.addEventListener('touchcancel', touchEndHandler, { passive: false });
    }

        const folderList = document.getElementById('folder-list');

    function ensureCurrentFolder() {
        if (!db.folders.includes(currentFolder)) {
            currentFolder = db.folders[0] || 'General';
        }
        setFolderState(currentFolder);
    }

    function renderFolders() {
        const list = document.getElementById('folder-list');
        list.innerHTML = db.folders
            .map((f) => {
                const escaped = escapeHtml(f);
                const arg = escapeJsSingle(f);
                return `
            <div class="folder-item ${f === currentFolder ? 'active' : ''}"
                 data-folder="${escaped}"
                 onclick="selectFolder('${arg}')"
                 oncontextmenu="showFolderCtx(event, '${arg}')">${escaped}</div>
        `;
            })
            .join('');

    function renderMemoList() {
        const list = document.getElementById('memo-list-container');
        const filtered = Sync ? Sync.getVisibleMemos(db, currentFolder) : db.memos.filter((m) => m.folder === currentFolder && !m.deletedAt);

        list.innerHTML = filtered
            .map((m) => {
                const title = escapeHtml(m.title || 'Untitled');
                const dateText = (m.updatedAt || m.date || '').split('T')[0];
                const idArg = escapeJsSingle(m.id);
                return `
            <div class="memo-item ${m.id === currentMemoId ? 'active' : ''}"
                 data-id="${escapeHtml(m.id)}"
                 onclick="selectMemo('${idArg}')"
                 oncontextmenu="showMemoCtx(event, '${idArg}')">
                <div class="m-title">${title}</div>
                <div class="m-date">${dateText}</div>
            </div>
        `;
            })
            .join('');

    function renameFolder() {
        const oldName = targetFolder;
        const newName = prompt(`Rename '${oldName}' to:`, oldName);

        if (newName && newName.trim() !== '' && newName !== oldName) {
            const nextName = newName.trim();
            if (db.folders.includes(nextName)) return alert('This folder name already exists.');

            const folderIndex = db.folders.indexOf(oldName);
            if (folderIndex !== -1) db.folders[folderIndex] = nextName;

            db.memos.forEach((m) => {
                if (m.folder === oldName) {
                    m.folder = nextName;
                    if (Sync) Sync.touchMemo(m);
                }
            });

            if (currentFolder === oldName) setFolderState(nextName);

            saveDB();
            scheduleCloudSync('rename-folder');
            renderFolders();
            renderMemoList();
        }
    }

    function addFolder() {
        const name = prompt('New Folder Name:');
        const next = name ? name.trim() : '';
        if (!next) return;
        if (db.folders.includes(next)) return;
        db.folders.push(next);
        saveDB();
        scheduleCloudSync('add-folder');
        renderFolders();
    }

    function deleteFolder() {
        if (db.folders.length <= 1) return alert('At least one folder is required.');
        if (!confirm(`Delete '${targetFolder}'?`)) return;

        const deleteTargets = db.memos.filter((m) => m.folder === targetFolder && !m.deletedAt);
        deleteTargets.forEach((memo) => {
            if (Sync) {
                Sync.markMemoDeleted(db, memo.id);
            } else {
                memo.deletedAt = new Date().toISOString();
            }
        });

        db.folders = db.folders.filter((f) => f !== targetFolder);
        currentFolder = db.folders[0] || 'General';
        saveDB();
        scheduleCloudSync('delete-folder');
        renderFolders();
        selectFolder(currentFolder);
    }

    function selectFolder(name) {
        if (suppressNextTapFolder === name) {
            suppressNextTapFolder = null;
            return;
        }
        suppressNextTapFolder = null;
        flushAutoSave();
        setFolderState(name);
        renderFolders();
        renderMemoList();
    }

    function selectMemo(id) {
        if (suppressNextTapMemo === id) {
            suppressNextTapMemo = null;
            return;
        }
        suppressNextTapMemo = null;
        flushAutoSave();
        currentMemoId = id;
        const memo = db.memos.find((m) => m.id === id && !m.deletedAt);
        if (!memo) {
            clearEditor();
            return;
        }

        document.getElementById('title-input').value = memo.title;
        document.getElementById('content-input').value = memo.content;
        document.getElementById('date-display').innerText = `MODIFIED: ${(memo.updatedAt || memo.date).replace('T', ' ').split('.')[0]}`;

        const imgCont = document.getElementById('image-preview-container');
        if (memo.image) {
            document.getElementById('preview-img').src = memo.image;
            imgCont.style.display = 'block';
        } else {
            imgCont.style.display = 'none';
        }
        renderMemoList();
        if (isAppMode) closeAppPanel();
    }

    function addMemo() {
        flushAutoSave();
        const id = Date.now().toString();
        const now = new Date().toISOString();
        db.memos.unshift({ id, folder: currentFolder, title: '', content: '', date: now, updatedAt: now, deletedAt: null, image: null });
        saveDB();
        scheduleCloudSync('add-memo');
        selectMemo(id);
    }

    function saveCurrentMemo() {
        const memo = db.memos.find((m) => m.id === currentMemoId && !m.deletedAt);
        if (!memo) return false;

        memo.title = document.getElementById('title-input').value;
        memo.content = document.getElementById('content-input').value;
        memo.deletedAt = null;
        if (Sync) Sync.touchMemo(memo);
        else memo.date = new Date().toISOString();

        document.getElementById('date-display').innerText = `MODIFIED: ${(memo.updatedAt || memo.date).replace('T', ' ').split('.')[0]}`;
        saveDB();
        scheduleCloudSync('edit-memo');
        renderMemoList();

    function handleImageUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
            const memo = db.memos.find((m) => m.id === currentMemoId && !m.deletedAt);
            if (!memo) return;

            memo.image = ev.target.result;
            if (Sync) Sync.touchMemo(memo);
            document.getElementById('preview-img').src = memo.image;
            document.getElementById('image-preview-container').style.display = 'block';
            saveDB();
            scheduleCloudSync('image-upload');
            renderMemoList();
        };

        const newMemo = JSON.parse(memoClipboard);
        const now = new Date().toISOString();
        newMemo.id = Date.now().toString();
        newMemo.folder = targetFolder;
        newMemo.date = now;
        newMemo.updatedAt = now;

    function moveMemoTo(target) {
        if (!target || !db.folders.includes(target)) return;
        const memo = db.memos.find((m) => m.id === targetMemoId && !m.deletedAt);
        if (!memo) return;
        if (memo.folder === target) return;
        memo.folder = target;
        if (Sync) Sync.touchMemo(memo);

        const movedOutOfCurrentFolder = memo.id === currentMemoId && currentFolder !== target;
        if (movedOutOfCurrentFolder) clearEditor();

        saveDB();
        scheduleCloudSync('move-memo');
        renderMemoList();
        document.getElementById('memo-ctx').style.display = 'none';
    }

    function renderMemoMoveTargets() {
        const container = document.getElementById('memo-move-targets');
        const memo = db.memos.find((m) => m.id === targetMemoId && !m.deletedAt);
        if (!memo) {
            container.innerHTML = '<div class="context-menu-item move-empty">No target</div>';

        }

        const targets = db.folders.filter((folder) => folder !== memo.folder);

    async function getGitHubConfigOrThrow(options) {
        if (!Sync) throw new Error('sync.js is not loaded.');
        const opts = options || {};
        let cfg = Sync.loadGitHubConfig();

        if (!cfg.token) {
            await restoreSessionTokenFromVault({ silent: opts.silent === true });
            cfg = Sync.loadGitHubConfig();
        }

        const missing = Sync.validateGitHubConfig(cfg);
        if (missing.length) {
            throw new Error(`GitHub setting is incomplete: ${missing.join(', ')} (Ctrl/Cmd+Shift+G)`);
        }
        return cfg;
    }

    function formatError(err) {
        if (!err) return 'Unknown error';
        if (err.status) return `${err.message} (HTTP ${err.status})`;
        return err.message || String(err);
    }

    async function configureGitHubSync() {
        if (!Sync) return alert('sync.js is not loaded.');
        const existing = Sync.loadGitHubConfig();

        const owner = prompt('GitHub owner/user:', existing.owner || '');
        if (owner === null) return;

        const repo = prompt('Private repo name:', existing.repo || '');
        if (repo === null) return;

        const branch = prompt('Branch name:', existing.branch || 'main');
        if (branch === null) return;

        const path = prompt('Data file path:', existing.path || 'data/notes.json');
        if (path === null) return;

        const token = prompt('Fine-grained PAT (Contents: Read and write):', existing.token || '');
        if (token === null) return;

        const config = { owner, repo, branch, path, token };
        const missing = Sync.validateGitHubConfig(config);
        if (missing.length) return alert('Missing fields: ' + missing.join(', '));

        const passphrase = prompt('End-to-end 보안 키(암호, 8자 이상):', '');
        if (passphrase === null) return;
        const key = String(passphrase).trim();
        if (key.length < 8) return alert('보안 키는 8자 이상이어야 합니다.');

        if (!isSecurityEnabled()) {
            const confirmPass = prompt('보안 키를 한번 더 입력하세요:', '');
            if (confirmPass === null) return;
            if (String(confirmPass).trim() !== key) return alert('보안 키가 일치하지 않습니다.');
            saveSecurityConfig({
                enabled: true,
                salt: randomBase64(16),
                iterations: SECURITY_ITERATIONS,
            });
        }

        setSessionPassphrase(key);
        await saveTokenVault(token, key);
        // Security hardening: PAT session-only + encrypted local vault.
        Sync.saveGitHubConfig(config, { persistToken: false });
        startAutoSync();
        triggerAutoSync('configured');
        alert('GitHub sync configured.\nE2E 암호화 + 자동 동기화가 활성화되었습니다.');
    }

    async function pullFromGitHub() {
        try {
            flushAutoSave();
            const config = await getGitHubConfigOrThrow({ silent: false });
            const pulled = await readRemoteDb(config, { silent: false });
            if (!pulled.exists) return alert('Remote file not found. Push first to create it.');
            db = Sync.mergeDb(db, pulled.db);
            remoteFileSha = pulled.sha;
            ensureCurrentFolder();
            saveDB();
            renderFolders();
            selectFolder(currentFolder);
            alert('Pull complete (merged).');
        } catch (err) {
            alert('Pull failed: ' + formatError(err));
        }
    }

    async function pushToGitHub() {
        try {
            flushAutoSave();
            const config = await getGitHubConfigOrThrow({ silent: false });
            let baseSha = remoteFileSha;
            if (!baseSha) {
                const remote = await readRemoteDb(config, { silent: false });
                baseSha = remote.exists ? remote.sha : null;
            }

            try {
                const pushed = await writeRemoteDb(config, db, baseSha, 'Manual push from BLACK SPACE OS', { silent: false });
                db = pushed.db;
                remoteFileSha = pushed.sha;
                saveDB();
                alert('Push complete.');
            } catch (err) {
                if (err && err.status === 409) {
                    const latest = await readRemoteDb(config, { silent: false });
                    const pushedRetry = await writeRemoteDb(config, db, latest.sha, 'Manual push from BLACK SPACE OS (retry)', { silent: false });
                    db = pushedRetry.db;
                    remoteFileSha = pushedRetry.sha;
                    saveDB();
                    alert('Push complete (retry).');
                    return;
                }
                throw err;
            }
        } catch (err) {
            alert('Push failed: ' + formatError(err));
        }
    }

    async function syncWithGitHub(options) {
        const opts = options || {};
        const silent = opts.silent === true;
        if (autoSyncInFlight) {
            if (!silent) alert('Sync is already in progress.');
            return null;
        }

        autoSyncInFlight = true;
        try {
            flushAutoSave();
            const config = await getGitHubConfigOrThrow({ silent });
            const remote = await readRemoteDb(config, { silent });

            if (!remote.exists) {
                const pushedInitial = await writeRemoteDb(config, db, null, 'Initialize notes from BLACK SPACE OS', { silent });
                db = pushedInitial.db;
                remoteFileSha = pushedInitial.sha;
                ensureCurrentFolder();
                saveDB();
                renderFolders();
                selectFolder(currentFolder);
                if (!silent) alert('Sync complete: push-initial');
                return { mode: 'push-initial', sha: pushedInitial.sha, db: pushedInitial.db };
            }

            const merged = Sync.mergeDb(db, remote.db);
            try {
                const pushed = await writeRemoteDb(config, merged, remote.sha, 'Sync notes from BLACK SPACE OS', { silent });
                db = pushed.db;
                remoteFileSha = pushed.sha;
            } catch (err) {
                if (!(err && err.status === 409)) throw err;
                const latest = await readRemoteDb(config, { silent });
                const retryMerged = Sync.mergeDb(merged, latest.db);
                const retryPushed = await writeRemoteDb(config, retryMerged, latest.sha, 'Sync notes from BLACK SPACE OS (retry)', { silent });
                db = retryPushed.db;
                remoteFileSha = retryPushed.sha;
            }

            ensureCurrentFolder();
            saveDB();
            renderFolders();
            selectFolder(currentFolder);
            if (!silent) alert('Sync complete.');
            return { mode: 'merged', sha: remoteFileSha, db };
        } catch (err) {
            if (!silent) {
                alert('Sync failed: ' + formatError(err));
            } else {
                console.warn('Auto sync failed:', err);
            }
            return null;
        } finally {
            autoSyncInFlight = false;
        }
    }

    document.addEventListener('keydown', (event) => {
        if (!(event.ctrlKey || event.metaKey) || !event.shiftKey) return;
        const key = event.key.toUpperCase();

        if (key === 'G') {
            event.preventDefault();
            configureGitHubSync();
            return;
        }
        if (key === 'U') {
            event.preventDefault();
            pullFromGitHub();
            return;
        }
        if (key === 'I') {
            event.preventDefault();
            pushToGitHub();
            return;
        }
        if (key === 'Y') {
            event.preventDefault();
            syncWithGitHub();
        }
    });

    document.addEventListener('click', () => {
        document.getElementById('folder-ctx').style.display = 'none';
        document.getElementById('memo-ctx').style.display = 'none';
        document.getElementById('sync-panel').classList.remove('open');
        closeAppPanel();
    });

    window.configureGitHubSync = configureGitHubSync;
    window.moveMemoTo = moveMemoTo;
    window.pullFromGitHub = pullFromGitHub;
    window.pushToGitHub = pushToGitHub;
    window.syncWithGitHub = syncWithGitHub;
    window.toggleSyncPanel = toggleSyncPanel;
    window.toggleAppPanel = toggleAppPanel;
    window.closeAppPanel = closeAppPanel;
</script>
</body>
</html>
